<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/styles/writingTools.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js" integrity="sha512-8BHxHDLsOHx+flIrQ0DrZcea7MkHqRU5GbTHmbdzMRnAaoCIkZ97PqZcXJkKZckMMhqfoeaJE+DNUVuyoQsO3Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <title>Document</title>
</head>
<body>
    <div class="main" id="overview" style="display: block;">
        <div style="display: flex; gap: 8px">
            <button onclick="writingTools('summarize')" class="tileButton large"><i data-lucide="scan-text" style="margin-bottom: 3px" stroke="rgba(255, 255, 255, 0.9)"></i>Summarize</button>
            <button class="tileButton large"><i data-lucide="pencil-ruler" style="margin-bottom: 3px" stroke="rgba(255, 255, 255, 0.9)"></i>Rewrite</button>
        </div>
        <div style="display: flex; flex-direction: column; row-gap: 0px; width: 100%; margin-top: 10px">
            <button class="tileButton transparent" style="align-items: center; justify-content: flex-start"><i data-lucide="smile" style="margin-right: 7px; width: 17px;" stroke="rgba(255, 255, 255, 0.9)"></i>Friendly</button>
            <button class="tileButton transparent" style="align-items: center; justify-content: flex-start"><i data-lucide="briefcase" style="margin-right: 7px; width: 17px;" stroke="rgba(255, 255, 255, 0.9)"></i>Professional</button>
            <button class="tileButton transparent" style="align-items: center; justify-content: flex-start"><i data-lucide="filter" style="margin-right: 7px; width: 17px;" stroke="rgba(255, 255, 255, 0.9)"></i>Concise</button>
        </div>
        <div style="width: 100%; height: 1px; background: rgba(255, 255, 255, 0.2); margin-top: 2.5px"></div>
        <div style="display: flex; flex-direction: column; row-gap: 0px; width: 100%; margin-top: 2.5px">
            <button class="tileButton transparent" style="align-items: center; justify-content: flex-start"><i data-lucide="list" style="margin-right: 7px; width: 17px;" stroke="rgba(255, 255, 255, 0.9)"></i>Points</button>
            <button class="tileButton transparent" style="align-items: center; justify-content: flex-start"><i data-lucide="list-ordered" style="margin-right: 7px; width: 17px;" stroke="rgba(255, 255, 255, 0.9)"></i>List</button>
        </div>
    </div>
    <div class="main" id="results" style="display: none;">

    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        /* Load icons */
        lucide.createIcons({
            attrs: {
                "stroke-width": 2,
            }
        });
        
        /* Socket.io*/
        const socket = io("http://localhost:7323");

        socket.on("connect", () => {
            console.log("Connected to server");
        });

        socketClient.on("getWritingTools", (data)=>{
            if (data.status == 'completed'){
                window.electronAPI.setAlwaysOnTop(false)
            } else {
                window.electronAPI.setAlwaysOnTop(true)
                setContent((old)=> old + data.response)
            }
        })
        /* Prompt functions */
        const prompts = {
            "summarize": "Summarize the following text concisely. Ensure that the result is shorter than the text allowing the user to easily understand the text in a glance. This is the text: {{text}}"
        }

        function writingTools(promptSelection){
            document.getElementById("main").style.display = "none"
            document.getElementById("results").style.display = "block"
            const newPrompt = props[promptSelection].replace("{{text}}", `To fire a one-way IPC message from a renderer process to the main process, you can use the ipcRenderer.send API to send a message that is then received by the ipcMain.on API. You usually use this pattern to call a main process API from your web contents. We'll demonstrate this pattern by creating a simple app that can programmatically change its window title. For this demo, you'll need to add code to your main process, your renderer process, and a preload script. The full code is below, but we'll be explaining each file individually in the following sections.`)
            console.log("[FOX WRITINGTOOLS] Sending prompt...", newPrompt)
            socket.emit("getWritingTools", {prompt: newPrompt})
        }

    </script>
</body>
</html>
